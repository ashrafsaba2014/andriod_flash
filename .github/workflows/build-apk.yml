name: Build Flet APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - uses: subosito/flutter-action@v2
        with: {flutter-version: '3.22.3', cache: true}  # ✅ إصدار مستقر متوافق مع Flet Android
      - run: pip install flet==0.23.2 flet-cli==0.23.2  # ✅ إصدار معروف بنجاحه على الأندرويد
      - run: flet build apk --module-name app
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/**/*.apk
