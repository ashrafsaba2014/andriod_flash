name: Build Kivy Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential git python3-dev ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            libavdevice-dev libgstreamer1.0-dev libunwind-dev

      - name: Install Buildozer
        run: pip install buildozer cython==0.29.33

      # ✅ الخطوة الحاسمة: قبول تراخيص أندرويد تلقائيًا (تحل مشكلة التوقف عند License Agreement)
      - name: Accept Android SDK Licenses
        run: |
          mkdir -p $ANDROID_HOME/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_HOME/licenses/android-sdk-preview-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" >> $ANDROID_HOME/licenses/android-sdk-license

      - name: Build APK
        env:
          BUILDOZER_ALLOW_ROOT: 1
        run: buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: kivy-flash-apk
          path: bin/*.apk
