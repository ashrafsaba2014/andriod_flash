name: Build Kivy Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: |
          # إصلاح صلاحيات المجلد داخل الحاوية
          sudo chown -R buildozer:buildozer .
          # تشغيل buildozer كمستخدم buildozer (المطلوب داخل الحاوية الرسمية)
          su buildozer -c "buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kivy-flash-apk
          path: bin/*.apk
